<div class="container">
    <div class="row">
        <div class="col-lg-12 text-center" id="i18_skills">
            <div class="navy-line"></div>
            <h1><span data-i18n="skills.my_skills">My Skills</span></h1>
        </div>
    </div>
    <div class="row features-block">
        {% for group in site.data.index.skills.groups %}
        <div class="col-sm-4 wow zoomIn text-center">
            <div class="team-member">
                <div class="vote-icon" style="text-align: center">
                    <i class="fa {{ group.icon }}"></i>
                </div>
                <h4><span class="navy">{{ group.name }}</span></h4>
                <ul class="list-unstyled">
                    {% for item in group.items %}
                    <li>{{ item }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
